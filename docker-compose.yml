services:
  postgres:
    image: postgres:16
    container_name: exam-prep-postgres
    restart: unless-stopped
    env_file: .env_postgres
    environment:
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=16MB -c maintenance_work_mem=64MB -c random_page_cost=1.1 -c password_encryption=md5"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - exam_prep_pg_data:/var/lib/postgresql/data
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2"
    shm_size: 512m
    networks:
      - exam_prep_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_prep"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

  pgbouncer:
    image: edoburu/pgbouncer:1.15.0
    container_name: exam-prep-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: exam_prep
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      LISTEN_PORT: 6432
    ports:
      - "127.0.0.1:6432:6432"
    networks:
      - exam_prep_net

  caddy:
    image: caddy:2
    container_name: exam-prep-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./artifacts/desktop-shell/release:/srv/desktop-updates:ro
      - exam_prep_caddy_data:/data
      - exam_prep_caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - exam_prep_net

volumes:
  exam_prep_pg_data:
  exam_prep_caddy_data:
  exam_prep_caddy_config:

networks:
  exam_prep_net:
    driver: bridge
