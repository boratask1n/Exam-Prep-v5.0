services:
  postgres:
    image: postgres:16
    container_name: exam-prep-postgres
    restart: unless-stopped
    env_file: .env_postgres
    environment:
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=16MB -c maintenance_work_mem=64MB -c random_page_cost=1.1"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - exam_prep_pg_data:/var/lib/postgresql/data
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2"
    shm_size: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_prep"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

volumes:
  exam_prep_pg_data:
